pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{ts,tsx,js,mjs,json,css,md}"
      run: ./node_modules/.bin/prettier --check {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{ts,tsx}"
      run: ./node_modules/.bin/eslint {staged_files}
      stage_fixed: true
    typecheck:
      run: ./node_modules/.bin/tsc --noEmit
