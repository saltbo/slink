pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{ts,tsx,js,mjs,json,css,md}"
      run: npx prettier --check {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{ts,tsx}"
      run: npx eslint {staged_files}
      stage_fixed: true
    typecheck:
      run: npx tsc --noEmit
